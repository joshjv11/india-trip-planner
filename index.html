<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>India Trip Planner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Playfair+Display:wght@700;800;900&display=swap');

        :root {
            --bg: #080810;
            --surface: #11111c;
            --surface2: #181826;
            --surface3: #1e1e30;
            --border: rgba(255,255,255,0.06);
            --border2: rgba(255,255,255,0.10);
            --accent: #e8a44a;
            --accent-dim: rgba(232,164,74,0.13);
            --accent-glow: rgba(232,164,74,0.22);
            --text: #e4e4f0;
            --text2: #a8a8c0;
            --muted: #6a6a88;
            --gold: #ffd166;
            --silver: #b8c4d8;
            --bronze: #d4925e;
            --temp-color: #ff7eb3;
            --temp-dim: rgba(255,126,179,0.12);
            --green: #4ecdc4;
            --heritage-color: #b07cf8;
            --heritage-dim: rgba(176,124,248,0.12);
            /* Budget category colors */
            --cat-acc:   #60a5fa;
            --cat-food:  #34d399;
            --cat-trans: #fbbf24;
            --cat-acts:  #a78bfa;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Header ── */
        header {
            position: relative;
            padding: 60px 24px 52px;
            text-align: center;
            overflow: hidden;
            border-bottom: 1px solid var(--border);
        }

        .header-glow {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 100% at 50% -10%, rgba(232,164,74,0.12) 0%, transparent 65%),
                radial-gradient(ellipse 40% 50% at 20% 80%, rgba(176,124,248,0.05) 0%, transparent 60%),
                radial-gradient(ellipse 40% 50% at 80% 80%, rgba(96,165,250,0.05) 0%, transparent 60%),
                linear-gradient(180deg, #100c00 0%, transparent 100%);
            pointer-events: none;
        }

        .eyebrow {
            font-size: 0.66em;
            font-weight: 600;
            letter-spacing: 3.5px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 14px;
            position: relative;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2em, 6vw, 3.8em);
            font-weight: 900;
            line-height: 1.05;
            position: relative;
            background: linear-gradient(135deg, #fff 30%, var(--accent) 70%, #ff9a3c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            margin-top: 12px;
            color: var(--muted);
            font-size: 0.93em;
            position: relative;
        }

        /* ── Desktop layout ── */
        .page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 20px 60px;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 28px;
            align-items: start;
        }

        .sidebar {
            position: sticky;
            top: 16px;
            max-height: calc(100vh - 32px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sec-label {
            font-size: 0.62em;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 10px;
            padding-left: 2px;
            flex-shrink: 0;
        }

        .controls-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 18px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
            flex: 1;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.07) transparent;
        }

        .controls-card::-webkit-scrollbar { width: 3px; }
        .controls-card::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

        /* ── Sliders ── */
        .slider-group { display: flex; flex-direction: column; gap: 9px; flex-shrink: 0; }

        .slider-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }

        .slider-name { font-size: 0.875em; font-weight: 500; color: var(--text); }

        .slider-val {
            font-size: 0.75em; font-weight: 700;
            color: var(--accent);
            background: var(--accent-dim);
            padding: 2px 9px; border-radius: 20px;
            min-width: 30px; text-align: center; flex-shrink: 0;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%; height: 5px;
            background: rgba(255,255,255,0.07);
            border-radius: 4px; outline: none; cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px; height: 20px;
            background: var(--accent); border-radius: 50%;
            box-shadow: 0 0 0 4px var(--accent-glow);
            transition: transform 0.15s, box-shadow 0.15s;
        }

        input[type="range"]:hover::-webkit-slider-thumb,
        input[type="range"]:active::-webkit-slider-thumb {
            transform: scale(1.2);
            box-shadow: 0 0 0 6px var(--accent-glow);
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px; height: 20px;
            background: var(--accent); border-radius: 50%; border: none;
        }

        /* ── Sub-sections ── */
        .temp-sub {
            margin-top: 2px; padding: 13px 13px;
            background: rgba(255,126,179,0.05);
            border: 1px solid rgba(255,126,179,0.13);
            border-radius: 12px;
            display: flex; flex-direction: column; gap: 9px;
        }

        .temp-sub .slider-name { font-size: 0.83em; color: var(--text2); }
        .temp-sub .slider-val  { color: var(--temp-color); background: var(--temp-dim); }

        .temp-sub input[type="range"] {
            background: linear-gradient(to right, #4fc3f7 0%, #81e6d9 35%, #fbbf24 65%, #ff7eb3 100%);
        }

        .temp-sub input[type="range"]::-webkit-slider-thumb {
            background: var(--temp-color);
            box-shadow: 0 0 0 4px rgba(255,126,179,0.22);
        }

        .temp-sub input[type="range"]::-moz-range-thumb { background: var(--temp-color); }

        .sub-hint { font-size: 0.7em; color: var(--muted); line-height: 1.45; }
        .divider { height: 1px; background: var(--border); flex-shrink: 0; }

        /* ── Results bar ── */
        .results-top {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px; gap: 10px; flex-wrap: wrap;
        }

        .results-top .sec-label { margin-bottom: 0; }

        .show-pills {
            display: flex; gap: 5px;
            overflow-x: auto; -webkit-overflow-scrolling: touch;
            scrollbar-width: none; padding-bottom: 2px;
        }

        .show-pills::-webkit-scrollbar { display: none; }

        .pill {
            font-size: 0.72em; font-weight: 600;
            padding: 6px 14px; border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent; color: var(--muted);
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            font-family: 'DM Sans', sans-serif;
            white-space: nowrap; flex-shrink: 0;
            touch-action: manipulation;
        }

        .pill:hover { border-color: rgba(232,164,74,0.3); color: var(--text); }

        .pill.active {
            background: var(--accent-dim);
            border-color: rgba(232,164,74,0.45);
            color: var(--accent);
        }

        /* ── Destination cards ── */
        #results { display: flex; flex-direction: column; gap: 10px; }

        .dest-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .dest-card:hover {
            border-color: rgba(232,164,74,0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .dest-card.r1 {
            border-color: rgba(255,209,102,0.25);
            box-shadow: 0 0 0 1px rgba(255,209,102,0.08), 0 0 40px rgba(255,209,102,0.06);
            background: linear-gradient(160deg, var(--surface) 0%, rgba(255,209,102,0.04) 100%);
        }

        .dest-card.r2 { border-color: rgba(184,196,216,0.18); }
        .dest-card.r3 { border-color: rgba(212,146,94,0.18); }

        /* Card main row */
        .card-main {
            display: grid;
            grid-template-columns: 50px 1fr auto;
            align-items: center;
            gap: 14px;
            padding: 16px 18px;
            cursor: pointer;
            user-select: none;
        }

        /* Rank badge */
        .rank {
            width: 50px; height: 50px;
            border-radius: 14px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            font-weight: 700; font-size: 1.1em;
            flex-shrink: 0;
            background: rgba(255,255,255,0.04);
            color: var(--muted); line-height: 1;
        }

        .rank small { font-size: 0.44em; font-weight: 400; opacity: 0.7; }
        .rank.gold   { background: rgba(255,209,102,0.12); color: var(--gold);   box-shadow: 0 0 16px rgba(255,209,102,0.1); }
        .rank.silver { background: rgba(184,196,216,0.12); color: var(--silver); }
        .rank.bronze { background: rgba(212,146,94,0.12);  color: var(--bronze); }

        /* Card body */
        .card-body { min-width: 0; }
        .dest-name { font-weight: 600; font-size: 0.97em; color: var(--text); margin-bottom: 7px; }

        .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }

        .tag {
            font-size: 0.66em; padding: 3px 8px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05); color: var(--muted);
            white-space: nowrap;
        }

        .tag.temp-tag   { background: var(--temp-dim); color: var(--temp-color); }
        .tag.temp-match { background: rgba(78,205,196,0.1); color: var(--green); }
        .tag.unesco-tag { background: rgba(176,124,248,0.15); color: #c4b5fd; font-weight: 600; }

        /* Mini bars */
        .mini-bar-row { display: flex; gap: 4px; }

        .mini-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }

        .mini-bar-bg { width: 100%; height: 5px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }

        .mini-bar-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width 0.35s ease; }
        .mini-bar-fill.temp-bar     { background: var(--temp-color); }
        .mini-bar-fill.heritage-bar { background: var(--heritage-color); }

        .mini-bar-label { font-size: 0.56em; color: var(--muted); white-space: nowrap; }

        /* ── Score ring (SVG) ── */
        .score-col {
            display: flex; flex-direction: column;
            align-items: center; gap: 8px; flex-shrink: 0;
        }

        .score-ring { display: block; overflow: visible; }

        .ring-track { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 3; }

        .ring-fill {
            fill: none; stroke-width: 3;
            stroke-linecap: round;
            transform-origin: center;
            transform: rotate(-90deg);
            transition: stroke-dasharray 0.5s cubic-bezier(0.4,0,0.2,1), stroke 0.3s;
        }

        .ring-text {
            font-family: 'Playfair Display', serif;
            font-weight: 700; font-size: 9px;
            text-anchor: middle; dominant-baseline: central;
            transition: fill 0.3s;
        }

        .budget-btn {
            font-size: 0.65em; font-weight: 600;
            padding: 5px 10px; border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(232,164,74,0.08); color: var(--accent);
            cursor: pointer; white-space: nowrap;
            font-family: 'DM Sans', sans-serif;
            transition: background 0.15s, border-color 0.15s;
            touch-action: manipulation;
        }

        .budget-btn:hover { background: rgba(232,164,74,0.16); border-color: rgba(232,164,74,0.4); }
        .budget-btn.open  { background: rgba(232,164,74,0.2);  border-color: rgba(232,164,74,0.5); }

        /* ── Budget Panel ── */
        .budget-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.45s cubic-bezier(0.4,0,0.2,1);
        }

        .budget-panel.open { max-height: 700px; }

        .budget-inner {
            border-top: 1px solid var(--border);
            padding: 20px 18px 22px;
            background: var(--surface2);
        }

        /* Tier selector */
        .budget-tiers {
            display: flex; gap: 6px; margin-bottom: 18px;
        }

        .tier-btn {
            flex: 1; padding: 8px 6px;
            border-radius: 10px; border: 1px solid var(--border);
            background: transparent; color: var(--muted);
            font-family: 'DM Sans', sans-serif; font-size: 0.78em; font-weight: 600;
            cursor: pointer; text-align: center;
            transition: all 0.15s; touch-action: manipulation;
        }

        .tier-btn:hover { border-color: var(--accent); color: var(--text); }

        .tier-btn.active-b { background: rgba(78,205,196,0.12); border-color: rgba(78,205,196,0.4); color: var(--green); }
        .tier-btn.active-m { background: var(--accent-dim); border-color: rgba(232,164,74,0.45); color: var(--accent); }
        .tier-btn.active-l { background: rgba(255,209,102,0.1); border-color: rgba(255,209,102,0.4); color: var(--gold); }

        /* Days row */
        .days-row {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 20px;
        }

        .days-label { font-size: 0.82em; color: var(--text2); flex: 1; }

        .days-ctrl { display: flex; align-items: center; gap: 0; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }

        .days-btn {
            width: 36px; height: 36px;
            background: var(--surface3); border: none;
            color: var(--text); font-size: 1.2em; font-weight: 600;
            cursor: pointer; font-family: 'DM Sans', sans-serif;
            transition: background 0.15s; touch-action: manipulation;
        }

        .days-btn:hover { background: rgba(232,164,74,0.15); }

        .days-num {
            min-width: 44px; height: 36px;
            background: var(--surface2);
            color: var(--accent); font-weight: 700; font-size: 0.95em;
            display: flex; align-items: center; justify-content: center;
            border-left: 1px solid var(--border); border-right: 1px solid var(--border);
        }

        /* Category breakdown */
        .breakdown { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

        .cat-row { display: flex; flex-direction: column; gap: 5px; }

        .cat-header {
            display: flex; align-items: center; justify-content: space-between;
        }

        .cat-left { display: flex; align-items: center; gap: 8px; }

        .cat-icon { font-size: 1em; width: 20px; text-align: center; }

        .cat-name { font-size: 0.8em; color: var(--text2); font-weight: 500; }

        .cat-per { font-size: 0.72em; color: var(--muted); }

        .cat-total { font-size: 0.82em; font-weight: 600; color: var(--text); }

        .cat-bar-bg {
            height: 5px; background: rgba(255,255,255,0.06);
            border-radius: 3px; overflow: hidden;
        }

        .cat-bar-fill {
            height: 100%; border-radius: 3px;
            transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
        }

        /* Total */
        .budget-total {
            background: var(--surface3);
            border: 1px solid var(--border2);
            border-radius: 14px;
            padding: 16px 18px;
            display: flex; align-items: center; justify-content: space-between;
            gap: 12px; margin-bottom: 14px;
        }

        .total-left {}

        .total-label { font-size: 0.7em; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }

        .total-inr {
            font-family: 'Playfair Display', serif;
            font-size: 1.7em; font-weight: 800; color: var(--accent); line-height: 1;
        }

        .total-usd { font-size: 0.78em; color: var(--muted); margin-top: 3px; }

        .total-right { text-align: right; }

        .per-day-lbl { font-size: 0.7em; color: var(--muted); margin-bottom: 4px; }

        .per-day-val { font-size: 1.1em; font-weight: 700; color: var(--text2); }

        /* Smart tip */
        .smart-tip {
            display: flex; align-items: flex-start; gap: 9px;
            padding: 12px 14px;
            background: rgba(176,124,248,0.06);
            border: 1px solid rgba(176,124,248,0.13);
            border-radius: 12px;
        }

        .tip-icon { font-size: 1em; flex-shrink: 0; margin-top: 1px; }

        .tip-text { font-size: 0.78em; color: var(--text2); line-height: 1.5; }

        .act-note { font-size: 0.72em; color: var(--muted); margin-top: 4px; }

        /* ── Mobile bottom sheet ── */
        .sheet-backdrop {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 200; opacity: 0;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(3px);
        }

        .sheet-backdrop.open { opacity: 1; }

        .mobile-sheet {
            display: none; position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--surface2);
            border-top: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px 24px 0 0;
            z-index: 201;
            transform: translateY(100%);
            transition: transform 0.38s cubic-bezier(0.32,0.72,0,1);
            max-height: 88vh;
            flex-direction: column;
        }

        .mobile-sheet.open { transform: translateY(0); }

        .sheet-handle-bar {
            width: 44px; height: 5px;
            background: rgba(255,255,255,0.12);
            border-radius: 3px; margin: 14px auto 0; flex-shrink: 0; cursor: grab;
        }

        .sheet-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 20px 12px; flex-shrink: 0;
            border-bottom: 1px solid var(--border);
        }

        .sheet-title { font-size: 0.78em; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }

        .sheet-close {
            width: 32px; height: 32px; border-radius: 50%;
            background: rgba(255,255,255,0.07); border: none;
            color: var(--muted); font-size: 1.1em; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            touch-action: manipulation; transition: background 0.15s;
        }

        .sheet-close:hover { background: rgba(255,255,255,0.12); }

        .sheet-body {
            overflow-y: auto; flex: 1;
            padding: 18px 20px 40px;
            display: flex; flex-direction: column; gap: 18px;
            -webkit-overflow-scrolling: touch;
        }

        .sheet-body .slider-group { gap: 12px; }
        .sheet-body .slider-name { font-size: 0.95em; }
        .sheet-body input[type="range"] { height: 6px; }
        .sheet-body input[type="range"]::-webkit-slider-thumb { width: 26px; height: 26px; }

        /* ── FAB ── */
        .fab {
            display: none; position: fixed;
            bottom: 28px; right: 20px;
            width: 58px; height: 58px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #ff9a3c);
            color: #1a1008; border: none; cursor: pointer;
            font-size: 1.4em; align-items: center; justify-content: center;
            box-shadow: 0 4px 24px rgba(232,164,74,0.4);
            z-index: 150; touch-action: manipulation;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .fab:active { transform: scale(0.92); }

        /* ── Mobile overrides ── */
        @media (max-width: 780px) {
            header { padding: 36px 20px 28px; }
            .page { grid-template-columns: 1fr; padding: 18px 12px 120px; gap: 0; }
            .sidebar { display: none; }
            .sheet-backdrop { display: block; pointer-events: none; }
            .sheet-backdrop.open { pointer-events: all; }
            .mobile-sheet { display: flex; }
            .fab { display: flex; }
            .card-main { padding: 14px 14px; gap: 11px; }
            .dest-card:hover { box-shadow: none; }
            .score-ring { width: 56px !important; height: 56px !important; }
            .mini-bar-label { font-size: 0.52em; }
            .show-pills { flex-wrap: nowrap; }
            .pill { padding: 7px 14px; font-size: 0.75em; }
            .budget-inner { padding: 16px 14px 18px; }
            .budget-tiers { gap: 5px; }
            .tier-btn { font-size: 0.73em; padding: 7px 4px; }
            .total-inr { font-size: 1.4em; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-glow"></div>
    <div class="eyebrow">Travel Intelligence · 37 Destinations</div>
    <h1>India Trip Planner</h1>
    <p>Weight what matters · Budget calculator · UNESCO & heritage scoring</p>
</header>

<div class="page">
    <aside class="sidebar">
        <div class="sec-label">Your Priorities</div>
        <div class="controls-card" id="controls-desktop"></div>
    </aside>

    <main>
        <div class="results-top">
            <div class="sec-label">Ranked Destinations</div>
            <div class="show-pills" id="show-pills">
                <button class="pill" data-n="5">Top 5</button>
                <button class="pill active" data-n="10">Top 10</button>
                <button class="pill" data-n="15">Top 15</button>
                <button class="pill" data-n="20">Top 20</button>
                <button class="pill" data-n="37">All 37</button>
            </div>
        </div>
        <div id="results"></div>
    </main>
</div>

<!-- Mobile bottom sheet -->
<div class="sheet-backdrop" id="backdrop"></div>
<div class="mobile-sheet" id="mobile-sheet">
    <div class="sheet-handle-bar" id="sheet-handle"></div>
    <div class="sheet-header">
        <span class="sheet-title">Your Priorities</span>
        <button class="sheet-close" id="sheet-close">✕</button>
    </div>
    <div class="sheet-body" id="controls-mobile"></div>
</div>

<button class="fab" id="fab" aria-label="Adjust priorities">⚙</button>

<script>

    let showN = 10;

    // ── Build sliders ──
    function buildSliders(container) {
        for (const key in parameters) {
            const group = document.createElement('div');
            group.className = 'slider-group';
            group.innerHTML = `
                <div class="slider-row">
                    <span class="slider-name">${parameters[key]}</span>
                    <span class="slider-val" id="${key}-val-${container.id}">5</span>
                </div>
                <input type="range" id="${key}-slider-${container.id}" data-param="${key}" min="0" max="10" value="5">`;
            container.appendChild(group);

            if (key === 'heritage') {
                const sub = document.createElement('div');
                sub.className = 'temp-sub';
                sub.style.cssText = 'background:rgba(176,124,248,0.05);border-color:rgba(176,124,248,0.13)';
                sub.innerHTML = `<div class="sub-hint" style="color:var(--heritage-color);opacity:0.85">Includes UNESCO sites, ancient temples, forts, royal palaces, colonial history & pilgrimage sites.</div>`;
                group.appendChild(sub);
                container.appendChild(Object.assign(document.createElement('div'), { className: 'divider' }));
            }

            if (key === 'climate') {
                const tempSub = document.createElement('div');
                tempSub.className = 'temp-sub';
                tempSub.innerHTML = `
                    <div class="slider-row">
                        <span class="slider-name">🌡️ Ideal Temperature</span>
                        <span class="slider-val" id="pref-temp-val-${container.id}">22°C</span>
                    </div>
                    <input type="range" id="pref-temp-${container.id}" min="5" max="40" value="22" step="1">
                    <div class="sub-hint">Destinations whose avg temp matches your ideal score higher on Climate.</div>`;
                group.appendChild(tempSub);
            }
        }
    }

    buildSliders(desktopControls);
    buildSliders(mobileControls);

    // ── Sync sliders ──
    function syncFrom(srcId, tgtId) {
        document.querySelectorAll(`#${srcId} input[data-param]`).forEach(src => {
            const tgt = document.querySelector(`#${tgtId} input[data-param="${src.dataset.param}"]`);
            if (tgt) tgt.value = src.value;
        });
        const st = document.getElementById(`pref-temp-${srcId}`);
        const tt = document.getElementById(`pref-temp-${tgtId}`);
        if (st && tt) tt.value = st.value;
    }

    // ── Pills ──
    pillsEl.querySelectorAll('.pill').forEach(btn => {
        btn.addEventListener('click', () => {
            pillsEl.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            showN = +btn.dataset.n;
            run(desktopControls.id);
        });
    });

    // ── Mobile sheet ──
    const openSheet  = () => { syncFrom(desktopControls.id, mobileControls.id); backdrop.classList.add('open'); mobileSheet.classList.add('open'); document.body.style.overflow = 'hidden'; };
    const closeSheet = () => { syncFrom(mobileControls.id, desktopControls.id); backdrop.classList.remove('open'); mobileSheet.classList.remove('open'); document.body.style.overflow = ''; run(desktopControls.id); };

    fab.addEventListener('click', openSheet);
    backdrop.addEventListener('click', closeSheet);
    sheetClose.addEventListener('click', closeSheet);
    document.getElementById('sheet-handle').addEventListener('click', closeSheet);

    let tsY = 0;
    mobileSheet.addEventListener('touchstart', e => { tsY = e.touches[0].clientY; }, { passive: true });
    mobileSheet.addEventListener('touchend',   e => { if (e.changedTouches[0].clientY - tsY > 55) closeSheet(); }, { passive: true });

    // ── Score helpers ──
    function tempScore(avg, pref) { return Math.max(0, 10 - Math.abs(avg - pref) * 0.75); }

    // ── Budget helpers ──
    function calcBudget(dest, tier, days) {
        const data = dest.budget[tier]; // [acc, food, trans, acts]
        const total = data[0] + data[1] + data[2] + data[3];
        return { perDay: total, grand: total * days, cats: data };
    }

    function fmt(n) { return '₹' + n.toLocaleString('en-IN'); }
    function fmtUSD(inr) { return '$' + Math.round(inr / USD_RATE).toLocaleString(); }

    // ── SVG Ring ──
    function scoreRing(score, color, size = 64) {
        const r = 15.9155; // circumference ≈ 100
        return `<svg class="score-ring" viewBox="0 0 36 36" width="${size}" height="${size}">
            <circle class="ring-track" cx="18" cy="18" r="${r}"/>
            <circle class="ring-fill" cx="18" cy="18" r="${r}" stroke="${color}"
                stroke-dasharray="${score} ${100 - score}"/>
            <text class="ring-text" x="18" y="19" fill="${color}">${score}</text>
        </svg>`;
    }

    // ── Budget panel HTML ──
    function buildBudgetPanel(dest) {
        const state = budgetState[dest.name];
        const { tier, days } = state;
        const calc = calcBudget(dest, tier, days);
        const maxCat = Math.max(...calc.cats);

        const tierBtns = ['b','m','l'].map((t, i) => {
            const labels = ['Budget','Mid-Range','Luxury'];
            const emojis = ['🎒','🏨','👑'];
            const active = tier === t ? `active-${t}` : '';
            return `<button class="tier-btn ${active}" onclick="setTier('${dest.name}','${t}')">${emojis[i]} ${labels[i]}</button>`;
        }).join('');

        const catRows = catConfig.map((cat, idx) => {
            const perDay = calc.cats[idx];
            const total  = perDay * (cat.key === 'acc' ? days : days);
            const pct    = maxCat > 0 ? (perDay / maxCat) * 100 : 0;
            return `<div class="cat-row">
                <div class="cat-header">
                    <div class="cat-left">
                        <span class="cat-icon">${cat.icon}</span>
                        <span class="cat-name">${cat.label}</span>
                        <span class="cat-per">${fmt(perDay)}/${cat.unit}</span>
                    </div>
                    <span class="cat-total">${fmt(total)}</span>
                </div>
                <div class="cat-bar-bg">
                    <div class="cat-bar-fill" style="width:${pct}%;background:${cat.color}"></div>
                </div>
            </div>`;
        }).join('');

        return `<div class="budget-inner" id="bi-${dest.name.replace(/[^a-z0-9]/gi,'_')}">
            <div class="budget-tiers">${tierBtns}</div>
            <div class="days-row">
                <span class="days-label">📅 How many days?</span>
                <div class="days-ctrl">
                    <button class="days-btn" onclick="addDays('${dest.name}',-1)">−</button>
                    <div class="days-num" id="dn-${dest.name.replace(/[^a-z0-9]/gi,'_')}">${days}</div>
                    <button class="days-btn" onclick="addDays('${dest.name}',+1)">+</button>
                </div>
            </div>
            <div class="breakdown">${catRows}</div>
            <div class="budget-total">
                <div class="total-left">
                    <div class="total-label">Total Estimated Budget</div>
                    <div class="total-inr" id="ti-${dest.name.replace(/[^a-z0-9]/gi,'_')}">${fmt(calc.grand)}</div>
                    <div class="total-usd">≈ ${fmtUSD(calc.grand)} USD &nbsp;·&nbsp; ${days} days</div>
                </div>
                <div class="total-right">
                    <div class="per-day-lbl">Per day</div>
                    <div class="per-day-val">${fmt(calc.perDay)}</div>
                </div>
            </div>
            <div class="smart-tip">
                <span class="tip-icon">💡</span>
                <div>
                    <div class="tip-text">${dest.budget.tip}</div>
                    <div class="act-note">🎭 ${dest.budget.actNote}</div>
                </div>
            </div>
        </div>`;
    }

    // ── Exposed global functions for budget controls ──
    window.setTier = function(name, tier) {
        budgetState[name].tier = tier;
        refreshBudgetPanel(name);
    };

    window.addDays = function(name, delta) {
        budgetState[name].days = Math.max(1, Math.min(30, budgetState[name].days + delta));
        refreshBudgetPanel(name);
    };

    function refreshBudgetPanel(name) {
        const dest = destinations.find(d => d.name === name);
        if (!dest) return;
        const id = name.replace(/[^a-z0-9]/gi, '_');
        const panel = document.getElementById(`bi-${id}`);
        if (!panel) return;
        panel.parentElement.innerHTML = buildBudgetPanel(dest);
    }

    // ── Toggle budget panel ──
    window.toggleBudget = function(name) {
        const id = name.replace(/[^a-z0-9]/gi, '_');
        const panel   = document.getElementById(`panel-${id}`);
        const btn     = document.getElementById(`bbtn-${id}`);
        if (!panel) return;
        const isOpen = panel.classList.toggle('open');
        budgetState[name].open = isOpen;
        if (btn) btn.classList.toggle('open', isOpen);
        if (isOpen && !panel.innerHTML.trim()) {
            panel.innerHTML = buildBudgetPanel(destinations.find(d => d.name === name));
        }
        btn.textContent = isOpen ? '✕ Close' : '₹ Budget';
    };

    // ── Scoring ──
    function run(srcId) {
        const W = {};
        document.querySelectorAll(`#${srcId} input[data-param]`).forEach(s => {
            W[s.dataset.param] = +s.value;
            const el = document.getElementById(`${s.dataset.param}-val-${srcId}`);
            if (el) el.textContent = s.value;
        });
        const prefEl = document.getElementById(`pref-temp-${srcId}`);
        const pref   = prefEl ? +prefEl.value : 22;
        const pve    = document.getElementById(`pref-temp-val-${srcId}`);
        if (pve) pve.textContent = pref + '°C';

        let maxScore = Object.values(W).reduce((a, w) => a + 10 * w, 0);
        if (maxScore === 0) maxScore = 1;

        const ranked = destinations.map(d => {
            let total = 0;
            for (const k in d.scores) {
                let s = d.scores[k];
                if (k === 'climate') s = (s + tempScore(d.avgTemp, pref)) / 2;
                total += s * (W[k] || 0);
            }
            return { ...d, finalScore: Math.round((total / maxScore) * 100), pref };
        }).sort((a, b) => b.finalScore - a.finalScore);

        render(ranked);
    }

    // ── Render ──
    function render(ranked) {
        const visible = ranked.slice(0, showN);
        resultsEl.innerHTML = '';

        visible.forEach((d, i) => {
            const rankClass  = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '';
            const badgeClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
            const ordinal    = ['1st','2nd','3rd'][i] ?? `${i + 1}`;
            const suffix     = ['st','nd','rd'][i] ?? '';

            const ringColor  = i === 0 ? 'var(--gold)' : i === 1 ? 'var(--silver)' : i === 2 ? 'var(--bronze)' : 'var(--accent)';
            const diff       = Math.abs(d.avgTemp - d.pref);
            const matchLabel = diff <= 2 ? 'Perfect' : diff <= 5 ? 'Near ideal' : diff <= 9 ? 'Close' : 'Far off';
            const matchClass = diff <= 5 ? 'temp-match' : 'temp-tag';
            const rc         = regionColors[d.region] ?? '#a0a0a0';
            const safeId     = d.name.replace(/[^a-z0-9]/gi, '_');

            const bars = Object.keys(d.scores).map(k => {
                const isCl = k === 'climate', isHe = k === 'heritage';
                const ds   = isCl ? (d.scores[k] + tempScore(d.avgTemp, d.pref)) / 2 : d.scores[k];
                const pct  = (ds / 10) * 100;
                const bc   = isCl ? 'temp-bar' : isHe ? 'heritage-bar' : '';
                const lbl  = k === 'heritage' ? 'Heritage' : k === 'connectivity' ? 'Connect.' : parameters[k].split(' ')[0];
                return `<div class="mini-bar-wrap" title="${parameters[k]}: ${ds.toFixed(1)}/10">
                    <div class="mini-bar-bg"><div class="mini-bar-fill ${bc}" style="width:${pct}%"></div></div>
                    <div class="mini-bar-label">${lbl}</div>
                </div>`;
            }).join('');

            const el = document.createElement('div');
            el.className = `dest-card ${rankClass}`;
            el.innerHTML = `
                <div class="card-main" onclick="toggleBudget('${d.name}')">
                    <div class="rank ${badgeClass}">
                        ${suffix ? `<span>${ordinal.replace(suffix,'')}</span><small>${suffix}</small>`
                                 : `<span style="font-size:0.82em">${ordinal}</span>`}
                    </div>
                    <div class="card-body">
                        <div class="dest-name">${d.name}</div>
                        <div class="tags">
                            <span class="tag" style="background:${rc}18;color:${rc}">${d.region}</span>
                            <span class="tag temp-tag">🌡️ ${d.avgTemp}°C</span>
                            <span class="tag ${matchClass}">${matchLabel}</span>
                            ${d.unesco ? `<span class="tag unesco-tag">🏛️ UNESCO</span>` : ''}
                        </div>
                        <div class="mini-bar-row">${bars}</div>
                    </div>
                    <div class="score-col">
                        ${scoreRing(d.finalScore, ringColor, 64)}
                        <button class="budget-btn" id="bbtn-${safeId}" onclick="event.stopPropagation();toggleBudget('${d.name}')">₹ Budget</button>
                    </div>
                </div>
                <div class="budget-panel ${budgetState[d.name].open ? 'open' : ''}" id="panel-${safeId}">
                    ${budgetState[d.name].open ? buildBudgetPanel(d) : ''}
                </div>`;
            resultsEl.appendChild(el);
        });
    }

    desktopControls.addEventListener('input', () => run(desktopControls.id));
    mobileControls.addEventListener('input',  () => run(mobileControls.id));

    run(desktopControls.id);
});
</script>
</body>
</html>
