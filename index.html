<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>India Trip Planner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800&display=swap');

        :root {
            --bg: #0d0d14;
            --surface: #16161f;
            --surface2: #1e1e2c;
            --border: rgba(255,255,255,0.07);
            --accent: #e8a44a;
            --accent-dim: rgba(232,164,74,0.12);
            --accent-glow: rgba(232,164,74,0.25);
            --text: #e2e2ec;
            --muted: #7c7c99;
            --gold: #ffd166;
            --silver: #b0b8c8;
            --bronze: #cd8a5a;
            --temp-color: #ff7eb3;
            --temp-dim: rgba(255,126,179,0.12);
            --green: #4ecdc4;
            --heritage-color: #c084fc;
            --heritage-dim: rgba(192,132,252,0.12);
            --sheet-radius: 24px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ─── Header ─── */
        header {
            position: relative;
            padding: 52px 24px 44px;
            text-align: center;
            overflow: hidden;
            border-bottom: 1px solid var(--border);
        }

        header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 70% 90% at 50% 0%, rgba(232,164,74,0.10) 0%, transparent 70%),
                        linear-gradient(180deg, #1a1008 0%, transparent 100%);
            pointer-events: none;
        }

        .eyebrow {
            font-size: 0.68em;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 12px;
            position: relative;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.9em, 5vw, 3.4em);
            font-weight: 800;
            color: var(--text);
            line-height: 1.1;
            position: relative;
        }

        header h1 span { color: var(--accent); }

        header p {
            margin-top: 10px;
            color: var(--muted);
            font-size: 0.92em;
            position: relative;
        }

        /* ─── Desktop layout (>780px) ─── */
        .page {
            max-width: 1180px;
            margin: 0 auto;
            padding: 32px 20px 60px;
            display: grid;
            grid-template-columns: 330px 1fr;
            gap: 26px;
            align-items: start;
        }

        .sidebar {
            position: sticky;
            top: 16px;
            max-height: calc(100vh - 32px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sec-label {
            font-size: 0.63em;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 10px;
            padding-left: 2px;
            flex-shrink: 0;
        }

        .controls-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
            flex: 1;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.08) transparent;
        }

        .controls-card::-webkit-scrollbar { width: 4px; }
        .controls-card::-webkit-scrollbar-track { background: transparent; }
        .controls-card::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

        /* ─── Sliders ─── */
        .slider-group { display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }

        .slider-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .slider-name { font-size: 0.875em; font-weight: 500; color: var(--text); }

        .slider-val {
            font-size: 0.78em;
            font-weight: 600;
            color: var(--accent);
            background: var(--accent-dim);
            padding: 2px 10px;
            border-radius: 20px;
            min-width: 32px;
            text-align: center;
            flex-shrink: 0;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.08);
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 0 4px var(--accent-glow);
            transition: transform 0.15s, box-shadow 0.15s;
        }

        input[type="range"]:hover::-webkit-slider-thumb,
        input[type="range"]:active::-webkit-slider-thumb {
            transform: scale(1.15);
            box-shadow: 0 0 0 6px var(--accent-glow);
        }

        input[type="range"]::-moz-range-thumb {
            width: 22px; height: 22px;
            background: var(--accent);
            border-radius: 50%; border: none;
        }

        /* ─── Sub-sections ─── */
        .temp-sub {
            margin-top: 2px;
            padding: 14px;
            background: rgba(255,126,179,0.05);
            border: 1px solid rgba(255,126,179,0.14);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .temp-sub .slider-name { font-size: 0.84em; color: var(--muted); }
        .temp-sub .slider-val  { color: var(--temp-color); background: var(--temp-dim); }

        .temp-sub input[type="range"] {
            background: linear-gradient(to right, #4fc3f7 0%, #81e6d9 35%, #fbbf24 65%, #ff7eb3 100%);
        }

        .temp-sub input[type="range"]::-webkit-slider-thumb {
            background: var(--temp-color);
            box-shadow: 0 0 0 4px rgba(255,126,179,0.25);
        }

        .temp-sub input[type="range"]:active::-webkit-slider-thumb {
            box-shadow: 0 0 0 6px rgba(255,126,179,0.25);
        }

        .temp-sub input[type="range"]::-moz-range-thumb { background: var(--temp-color); }

        .sub-hint { font-size: 0.7em; color: var(--muted); line-height: 1.45; }

        .divider { height: 1px; background: var(--border); flex-shrink: 0; }

        /* ─── Results top bar ─── */
        .results-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
            gap: 10px;
        }

        .results-top .sec-label { margin-bottom: 0; }

        .show-pills {
            display: flex;
            gap: 5px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            padding-bottom: 2px;
        }

        .show-pills::-webkit-scrollbar { display: none; }

        .pill {
            font-size: 0.72em;
            font-weight: 600;
            padding: 6px 13px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            font-family: 'DM Sans', sans-serif;
            white-space: nowrap;
            flex-shrink: 0;
            touch-action: manipulation;
        }

        .pill:hover { border-color: rgba(232,164,74,0.3); color: var(--text); }

        .pill.active {
            background: var(--accent-dim);
            border-color: rgba(232,164,74,0.4);
            color: var(--accent);
        }

        /* ─── Destination cards ─── */
        #results { display: flex; flex-direction: column; gap: 10px; }

        .dest-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px 18px;
            display: grid;
            grid-template-columns: 48px 1fr auto;
            align-items: center;
            gap: 14px;
            transition: transform 0.17s ease, border-color 0.17s ease, box-shadow 0.17s ease;
            cursor: default;
        }

        .dest-card:hover {
            transform: translateX(5px);
            border-color: rgba(232,164,74,0.22);
            box-shadow: 0 6px 28px rgba(0,0,0,0.35), -3px 0 0 var(--accent);
        }

        .dest-card.r1 {
            border-color: rgba(255,209,102,0.3);
            background: linear-gradient(135deg, var(--surface) 0%, rgba(255,209,102,0.05) 100%);
        }

        .dest-card.r2 { border-color: rgba(176,184,200,0.2); }
        .dest-card.r3 { border-color: rgba(205,138,90,0.2); }

        .rank {
            width: 48px; height: 48px;
            border-radius: 13px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            font-weight: 700; font-size: 1.05em;
            flex-shrink: 0;
            background: rgba(255,255,255,0.04);
            color: var(--muted);
            line-height: 1;
        }

        .rank small { font-size: 0.46em; font-weight: 400; opacity: 0.7; }
        .rank.gold   { background: rgba(255,209,102,0.1); color: var(--gold); }
        .rank.silver { background: rgba(176,184,200,0.1); color: var(--silver); }
        .rank.bronze { background: rgba(205,138,90,0.1);  color: var(--bronze); }

        .dest-name {
            font-weight: 600;
            font-size: 0.97em;
            color: var(--text);
            margin-bottom: 7px;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 9px;
        }

        .tag {
            font-size: 0.67em;
            padding: 3px 8px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            color: var(--muted);
            white-space: nowrap;
        }

        .tag.temp-tag     { background: var(--temp-dim); color: var(--temp-color); }
        .tag.temp-match   { background: rgba(78,205,196,0.1); color: var(--green); }
        .tag.unesco-tag   { background: rgba(192,132,252,0.18); color: #d8b4fe; font-weight: 600; }

        .mini-bar-row { display: flex; gap: 4px; }

        .mini-bar-wrap {
            flex: 1;
            display: flex; flex-direction: column;
            align-items: center; gap: 4px;
        }

        .mini-bar-bg {
            width: 100%; height: 5px;
            background: rgba(255,255,255,0.06);
            border-radius: 3px; overflow: hidden;
        }

        .mini-bar-fill {
            height: 100%; border-radius: 3px;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        .mini-bar-fill.temp-bar     { background: var(--temp-color); }
        .mini-bar-fill.heritage-bar { background: var(--heritage-color); }

        .mini-bar-label { font-size: 0.58em; color: var(--muted); white-space: nowrap; }

        .score-wrap { text-align: right; flex-shrink: 0; }

        .score-num {
            font-family: 'Playfair Display', serif;
            font-size: 2.1em; font-weight: 700;
            color: var(--accent); line-height: 1;
        }

        .score-lbl {
            font-size: 0.56em; color: var(--muted);
            text-transform: uppercase; letter-spacing: 1px; margin-top: 3px;
        }

        /* ─── Mobile styles (<= 780px) ─── */
        @media (max-width: 780px) {

            header {
                padding: 36px 20px 28px;
            }

            /* Single-column layout, sidebar hidden */
            .page {
                grid-template-columns: 1fr;
                padding: 20px 14px 120px; /* bottom padding for FAB */
                gap: 0;
            }

            .sidebar { display: none; } /* replaced by bottom sheet */

            /* Cards: full-width, slightly simplified */
            .dest-card {
                grid-template-columns: 44px 1fr auto;
                padding: 14px 14px;
                gap: 11px;
                border-radius: 14px;
            }

            /* Disable translateX hover on touch */
            .dest-card:hover { transform: none; }
            .dest-card:active { opacity: 0.85; }

            .dest-name { font-size: 0.92em; }

            .score-num { font-size: 1.8em; }

            /* Smaller mini-bar labels on mobile */
            .mini-bar-label { font-size: 0.52em; }

            /* Pills: horizontally scrollable */
            .show-pills { flex-wrap: nowrap; }

            .pill { padding: 7px 14px; font-size: 0.75em; }

            .results-top { margin-bottom: 12px; }
        }

        /* ─── Bottom sheet (mobile) ─── */
        .sheet-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            z-index: 200;
            opacity: 0;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(2px);
        }

        .sheet-backdrop.open { opacity: 1; }

        .mobile-sheet {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--surface2);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-radius: var(--sheet-radius) var(--sheet-radius) 0 0;
            z-index: 201;
            transform: translateY(100%);
            transition: transform 0.38s cubic-bezier(0.32, 0.72, 0, 1);
            max-height: 88vh;
            display: none;
            flex-direction: column;
        }

        .mobile-sheet.open { transform: translateY(0); }

        .sheet-handle-bar {
            width: 44px; height: 5px;
            background: rgba(255,255,255,0.15);
            border-radius: 3px;
            margin: 14px auto 0;
            flex-shrink: 0;
            cursor: pointer;
        }

        .sheet-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px 12px;
            flex-shrink: 0;
            border-bottom: 1px solid var(--border);
        }

        .sheet-title {
            font-size: 0.8em;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
        }

        .sheet-close {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.07);
            border: none;
            color: var(--muted);
            font-size: 1.1em;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            touch-action: manipulation;
            transition: background 0.15s;
        }

        .sheet-close:hover { background: rgba(255,255,255,0.12); }

        .sheet-body {
            overflow-y: auto;
            flex: 1;
            padding: 18px 20px 32px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            -webkit-overflow-scrolling: touch;
        }

        /* Sheet slider groups — slightly more spacious */
        .sheet-body .slider-group { gap: 12px; }
        .sheet-body .slider-name  { font-size: 0.95em; }

        /* Bigger thumbs in sheet for touch */
        .sheet-body input[type="range"] { height: 6px; }

        .sheet-body input[type="range"]::-webkit-slider-thumb {
            width: 26px;
            height: 26px;
        }

        /* ─── FAB ─── */
        .fab {
            display: none;
            position: fixed;
            bottom: 28px;
            right: 20px;
            width: 58px; height: 58px;
            border-radius: 50%;
            background: var(--accent);
            color: #1a1008;
            border: none;
            cursor: pointer;
            font-size: 1.5em;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 24px rgba(232,164,74,0.45);
            z-index: 150;
            transition: transform 0.2s, box-shadow 0.2s;
            touch-action: manipulation;
        }

        .fab:active { transform: scale(0.93); }

        /* Active count badge on FAB */
        .fab-badge {
            position: absolute;
            top: -2px; right: -2px;
            width: 18px; height: 18px;
            border-radius: 50%;
            background: #ff7eb3;
            color: white;
            font-size: 0.48em;
            font-weight: 700;
            display: none;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--bg);
        }

        .fab-badge.visible { display: flex; }

        @media (max-width: 780px) {
            .sheet-backdrop { display: block; pointer-events: none; }
            .sheet-backdrop.open { pointer-events: all; }
            .mobile-sheet { display: flex; }
            .fab { display: flex; }
        }
    </style>
</head>
<body>

<header>
    <div class="eyebrow">Travel Intelligence</div>
    <h1>India <span>Trip Planner</span></h1>
    <p>Weight what matters — rankings update instantly across 37 destinations.</p>
</header>

<!-- Desktop layout -->
<div class="page">
    <aside class="sidebar">
        <div class="sec-label">Your Priorities</div>
        <div class="controls-card" id="controls-desktop"></div>
    </aside>

    <main>
        <div class="results-top">
            <div class="sec-label">Ranked Destinations</div>
            <div class="show-pills" id="show-pills">
                <button class="pill" data-n="5">Top 5</button>
                <button class="pill active" data-n="10">Top 10</button>
                <button class="pill" data-n="15">Top 15</button>
                <button class="pill" data-n="20">Top 20</button>
                <button class="pill" data-n="37">All 37</button>
            </div>
        </div>
        <div id="results"></div>
    </main>
</div>

<!-- Mobile bottom sheet -->
<div class="sheet-backdrop" id="backdrop"></div>
<div class="mobile-sheet" id="mobile-sheet">
    <div class="sheet-handle-bar" id="sheet-handle"></div>
    <div class="sheet-header">
        <span class="sheet-title">Your Priorities</span>
        <button class="sheet-close" id="sheet-close" aria-label="Close">✕</button>
    </div>
    <div class="sheet-body" id="controls-mobile"></div>
</div>

<!-- FAB -->
<button class="fab" id="fab" aria-label="Adjust priorities">
    <span>⚙</span>
    <div class="fab-badge" id="fab-badge">!</div>
</button>

        { name: 'Agra, Uttar Pradesh',       region: 'North',      avgTemp: 25, unesco: true,  scores: { cleanliness: 4,  sites: 10, safety: 6,  price: 8, connectivity: 10, food: 7,  climate: 5,  heritage: 10 } },
        { name: 'Varanasi, Uttar Pradesh',   region: 'North',      avgTemp: 24, unesco: false, scores: { cleanliness: 4,  sites: 10, safety: 7,  price: 7, connectivity: 9,  food: 8,  climate: 5,  heritage: 9 } },
        { name: 'Amritsar, Punjab',          region: 'North',      avgTemp: 22, unesco: false, scores: { cleanliness: 7,  sites: 9,  safety: 8,  price: 8, connectivity: 9,  food: 9,  climate: 6,  heritage: 9 } },
        { name: 'Rishikesh, Uttarakhand',    region: 'North',      avgTemp: 20, unesco: false, scores: { cleanliness: 7,  sites: 8,  safety: 8,  price: 8, connectivity: 8,  food: 7,  climate: 8,  heritage: 7 } },
        // Himalayas
        { name: 'Shimla, Himachal Pradesh',  region: 'Himalayas',  avgTemp: 13, unesco: true,  scores: { cleanliness: 7,  sites: 7,  safety: 9,  price: 7, connectivity: 7,  food: 7,  climate: 9,  heritage: 7 } },
        { name: 'Manali, Himachal Pradesh',  region: 'Himalayas',  avgTemp: 10, unesco: false, scores: { cleanliness: 7,  sites: 10, safety: 8,  price: 8, connectivity: 5,  food: 7,  climate: 9,  heritage: 5 } },
        { name: 'Kasol, Himachal Pradesh',   region: 'Himalayas',  avgTemp: 14, unesco: false, scores: { cleanliness: 7,  sites: 8,  safety: 7,  price: 9, connectivity: 4,  food: 6,  climate: 9,  heritage: 3 } },
        { name: 'McLeod Ganj, HP',           region: 'Himalayas',  avgTemp: 16, unesco: false, scores: { cleanliness: 7,  sites: 8,  safety: 9,  price: 8, connectivity: 6,  food: 7,  climate: 9,  heritage: 7 } },
        { name: 'Leh-Ladakh',                region: 'Himalayas',  avgTemp: 8,  unesco: false, scores: { cleanliness: 8,  sites: 10, safety: 8,  price: 7, connectivity: 4,  food: 6,  climate: 8,  heritage: 8 } },
        { name: 'Spiti Valley, HP',          region: 'Himalayas',  avgTemp: 7,  unesco: false, scores: { cleanliness: 9,  sites: 10, safety: 7,  price: 8, connectivity: 3,  food: 5,  climate: 7,  heritage: 8 } },
        // Northeast
        { name: 'Gangtok, Sikkim',           region: 'Northeast',  avgTemp: 15, unesco: false, scores: { cleanliness: 10, sites: 9,  safety: 10, price: 8, connectivity: 4,  food: 7,  climate: 9,  heritage: 6 } },
        { name: 'Darjeeling, West Bengal',   region: 'Northeast',  avgTemp: 14, unesco: true,  scores: { cleanliness: 7,  sites: 9,  safety: 9,  price: 8, connectivity: 5,  food: 7,  climate: 9,  heritage: 7 } },
        { name: 'Shillong, Meghalaya',       region: 'Northeast',  avgTemp: 18, unesco: false, scores: { cleanliness: 8,  sites: 9,  safety: 8,  price: 8, connectivity: 6,  food: 8,  climate: 8,  heritage: 5 } },
        { name: 'Ziro Valley, Arunachal',    region: 'Northeast',  avgTemp: 18, unesco: false, scores: { cleanliness: 9,  sites: 9,  safety: 9,  price: 9, connectivity: 3,  food: 6,  climate: 8,  heritage: 7 } },
        // Islands & Remote
        { name: 'Andaman Islands',           region: 'Islands',    avgTemp: 29, unesco: false, scores: { cleanliness: 9,  sites: 10, safety: 9,  price: 5, connectivity: 5,  food: 7,  climate: 8,  heritage: 6 } },
        { name: 'Rann of Kutch, Gujarat',    region: 'West',       avgTemp: 27, unesco: true,  scores: { cleanliness: 7,  sites: 9,  safety: 8,  price: 8, connectivity: 6,  food: 7,  climate: 6,  heritage: 8 } },
    ];

    const parameters = {
        cleanliness:  'Cleanliness',
        sites:        'Tourist Sites',
        heritage:     'Cultural Heritage',
        safety:       'Safety',
        price:        'Affordability',
        connectivity: 'Connectivity',
        food:         'Food & Stay',
        climate:      'Climate',
    };

    const barClass = { climate: 'temp-bar', heritage: 'heritage-bar' };

    const regionColors = {
        'South': '#a78bfa', 'North': '#60a5fa', 'West': '#34d399',
        'Himalayas': '#93c5fd', 'Northeast': '#f9a8d4', 'Islands': '#fbbf24',
    };

    const desktopControls = document.getElementById('controls-desktop');
    const mobileControls  = document.getElementById('controls-mobile');
    const resultsEl       = document.getElementById('results');
    const pillsEl         = document.getElementById('show-pills');
    const fab             = document.getElementById('fab');
    const backdrop        = document.getElementById('backdrop');
    const mobileSheet     = document.getElementById('mobile-sheet');
    const sheetClose      = document.getElementById('sheet-close');
    const sheetHandle     = document.getElementById('sheet-handle');
    const fabBadge        = document.getElementById('fab-badge');

    let showN = 10;

    // ── Build slider HTML ──
    function buildSliders(container) {
        for (const key in parameters) {
            const group = document.createElement('div');
            group.className = 'slider-group';
            group.innerHTML = `
                <div class="slider-row">
                    <span class="slider-name">${parameters[key]}</span>
                    <span class="slider-val" id="${key}-val-${container.id}">5</span>
                </div>
                <input type="range" id="${key}-slider-${container.id}" data-param="${key}" min="0" max="10" value="5">
            `;
            container.appendChild(group);

            if (key === 'heritage') {
                const sub = document.createElement('div');
                sub.className = 'temp-sub';
                sub.style.cssText = 'background:rgba(192,132,252,0.05);border-color:rgba(192,132,252,0.14)';
                sub.innerHTML = `<div class="sub-hint" style="color:var(--heritage-color);opacity:0.85">Includes UNESCO sites, ancient temples, forts, colonial history & pilgrimage sites.</div>`;
                group.appendChild(sub);
                const div = document.createElement('div');
                div.className = 'divider';
                container.appendChild(div);
            }

            if (key === 'climate') {
                const tempSub = document.createElement('div');
                tempSub.className = 'temp-sub';
                tempSub.innerHTML = `
                    <div class="slider-row">
                        <span class="slider-name">&#127777;&#65039; Ideal Temperature</span>
                        <span class="slider-val" id="pref-temp-val-${container.id}">22°C</span>
                    </div>
                    <input type="range" id="pref-temp-${container.id}" min="5" max="40" value="22" step="1">
                    <div class="sub-hint">Destinations whose avg temp matches your ideal score higher on Climate.</div>
                `;
                group.appendChild(tempSub);
            }
        }
    }

    buildSliders(desktopControls);
    buildSliders(mobileControls);

    // ── Sync sliders between desktop and mobile ──
    function syncFrom(sourceId, targetId) {
        document.querySelectorAll(`#${sourceId} input[data-param]`).forEach(src => {
            const tgt = document.querySelector(`#${targetId} input[data-param="${src.dataset.param}"]`);
            if (tgt) tgt.value = src.value;
        });
        const srcTemp = document.getElementById(`pref-temp-${sourceId}`);
        const tgtTemp = document.getElementById(`pref-temp-${targetId}`);
        if (srcTemp && tgtTemp) tgtTemp.value = srcTemp.value;
    }

    // ── Pill buttons ──
    pillsEl.querySelectorAll('.pill').forEach(btn => {
        btn.addEventListener('click', () => {
            pillsEl.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            showN = +btn.dataset.n;
            run(desktopControls.id);
        });
    });

    // ── Bottom sheet controls ──
    function openSheet() {
        syncFrom(desktopControls.id, mobileControls.id);
        backdrop.classList.add('open');
        mobileSheet.classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeSheet() {
        syncFrom(mobileControls.id, desktopControls.id);
        backdrop.classList.remove('open');
        mobileSheet.classList.remove('open');
        document.body.style.overflow = '';
        run(desktopControls.id);
    }

    fab.addEventListener('click', openSheet);
    backdrop.addEventListener('click', closeSheet);
    sheetClose.addEventListener('click', closeSheet);
    sheetHandle.addEventListener('click', closeSheet);

    // ── Swipe down to close sheet ──
    let touchStartY = 0;
    mobileSheet.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
    mobileSheet.addEventListener('touchend', e => {
        const delta = e.changedTouches[0].clientY - touchStartY;
        if (delta > 60) closeSheet();
    }, { passive: true });

    // ── Score calculation ──
    function tempScore(destAvg, preferred) {
        return Math.max(0, 10 - Math.abs(destAvg - preferred) * 0.75);
    }

    function run(sourceId) {
        const W = {};
        document.querySelectorAll(`#${sourceId} input[data-param]`).forEach(s => {
            W[s.dataset.param] = +s.value;
            const valEl = document.getElementById(`${s.dataset.param}-val-${sourceId}`);
            if (valEl) valEl.textContent = s.value;
        });

        const prefTempEl = document.getElementById(`pref-temp-${sourceId}`);
        const preferred  = prefTempEl ? +prefTempEl.value : 22;
        const prefValEl  = document.getElementById(`pref-temp-val-${sourceId}`);
        if (prefValEl) prefValEl.textContent = preferred + '°C';

        let maxScore = Object.values(W).reduce((a, w) => a + 10 * w, 0);
        if (maxScore === 0) maxScore = 1;

        const ranked = destinations.map(d => {
            let total = 0;
            for (const k in d.scores) {
                let s = d.scores[k];
                if (k === 'climate') s = (s + tempScore(d.avgTemp, preferred)) / 2;
                total += s * (W[k] || 0);
            }
            return { ...d, finalScore: Math.round((total / maxScore) * 100), preferred };
        }).sort((a, b) => b.finalScore - a.finalScore);

        render(ranked);
    }

    function render(ranked) {
        const visible = ranked.slice(0, showN);
        resultsEl.innerHTML = '';

        visible.forEach((d, i) => {
            const card       = document.createElement('div');
            const rankClass  = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '';
            const badgeClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
            const ordinal    = ['1st','2nd','3rd'][i] ?? `${i + 1}`;
            const suffix     = ['st','nd','rd'][i] ?? '';

            const diff       = Math.abs(d.avgTemp - d.preferred);
            const matchLabel = diff <= 2 ? 'Perfect' : diff <= 5 ? 'Near ideal' : diff <= 9 ? 'Close' : 'Far off';
            const matchClass = diff <= 5 ? 'temp-match' : 'temp-tag';
            const regionColor = regionColors[d.region] ?? '#a0a0a0';

            const bars = Object.keys(d.scores).map(k => {
                const isClimate = k === 'climate';
                const dispScore = isClimate
                    ? (d.scores[k] + tempScore(d.avgTemp, d.preferred)) / 2
                    : d.scores[k];
                const pct = (dispScore / 10) * 100;
                const bc  = barClass[k] ? ` ${barClass[k]}` : '';
                const lbl = k === 'heritage' ? 'Heritage' : k === 'connectivity' ? 'Connect.' : parameters[k].split(' ')[0];
                return `<div class="mini-bar-wrap" title="${parameters[k]}: ${dispScore.toFixed(1)}/10">
                    <div class="mini-bar-bg"><div class="mini-bar-fill${bc}" style="width:${pct}%"></div></div>
                    <div class="mini-bar-label">${lbl}</div>
                </div>`;
            }).join('');

            card.className = `dest-card ${rankClass}`;
            card.innerHTML = `
                <div class="rank ${badgeClass}">
                    ${suffix ? `<span>${ordinal.replace(suffix,'')}</span><small>${suffix}</small>`
                             : `<span style="font-size:0.82em">${ordinal}</span>`}
                </div>
                <div class="card-body">
                    <div class="dest-name">${d.name}</div>
                    <div class="tags">
                        <span class="tag" style="background:${regionColor}18;color:${regionColor}">${d.region}</span>
                        <span class="tag temp-tag">&#127777; ${d.avgTemp}°C</span>
                        <span class="tag ${matchClass}">${matchLabel}</span>
                        ${d.unesco ? `<span class="tag unesco-tag">&#127963; UNESCO</span>` : ''}
                    </div>
                    <div class="mini-bar-row">${bars}</div>
                </div>
                <div class="score-wrap">
                    <div class="score-num">${d.finalScore}</div>
                    <div class="score-lbl">score</div>
                </div>`;
            resultsEl.appendChild(card);
        });
    }

    // ── Listen on both control panels ──
    desktopControls.addEventListener('input', () => run(desktopControls.id));
    mobileControls.addEventListener('input',  () => run(mobileControls.id));

    run(desktopControls.id);
});
</script>
</body>
</html>
